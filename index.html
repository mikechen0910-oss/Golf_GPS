<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf GPS - Pro 3D Satellite</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --primary: #1b5e20; --accent: #ffeb3b; --active: #00e676; --bg-dark: #121212; --user-blue: #2196F3; }
        body { margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; background: var(--bg-dark); overflow: hidden; }
        #map { flex: 1; width: 100%; background: #000; }

        .control-panel { background: white; padding: 12px; border-radius: 20px 20px 0 0; z-index: 900; box-shadow: 0 -5px 20px rgba(0,0,0,0.4); }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        select { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid var(--primary); font-size: 15px; font-weight: bold; background: #fff; outline: none; }
        
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 5px; flex: 1; color: white; }
        .btn-blue { background: #0277bd; }
        .btn-orange { background: #ef6c00; }
        .btn-green { background: var(--primary); }
        
        .display-card { 
            background: #1a1a1a; color: #fff; padding: 12px; border-radius: 10px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 3px solid transparent; border-left: 5px solid var(--accent);
        }
        .display-card.active { border: 3px solid var(--active); background: #002e1a; }
        .dist-val { font-size: 38px; font-weight: 900; color: var(--accent); }

        .map-label { 
            background: rgba(255,255,255,0.9); padding: 5px 10px; border-radius: 15px; 
            border: 2px solid var(--primary); font-weight: bold; font-size: 12px; 
            color: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .user-marker {
            width: 16px; height: 16px; background: var(--user-blue);
            border: 3px solid white; border-radius: 50%; box-shadow: 0 0 12px rgba(0,0,0,0.8);
            position: relative;
        }
        .user-marker::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; background: var(--user-blue); animation: pulse 2s infinite; z-index: -1;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        .scorecard-panel {
            background: rgba(255,255,255,0.97);
            border-radius: 16px;
            padding: 12px;
            margin-top: 10px;
            color: #222;
            border: 1px solid rgba(0,0,0,0.12);
            max-height: 320px;
            overflow: auto;
        }
        .scorecard-panel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: var(--primary);
        }
        .scorecard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .scorecard-table th,
        .scorecard-table td {
            padding: 6px 8px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            text-align: center;
        }
        .scorecard-table th {
            background: rgba(33,150,243,0.1);
            color: #0d47a1;
            font-weight: 700;
        }
        .scorecard-row.active {
            background: rgba(255,235,59,0.3);
        }
        .scorecard-summary {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .scorecard-summary span {
            flex: 1 1 120px;
            background: #f5f5f5;
            border-radius: 8px;
            padding: 8px;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="control-panel">
    <div class="row">
        <button class="btn btn-blue" onclick="locateGPS()">📍 我的位置</button>
        <button class="btn btn-orange" onclick="findCourses()">⛳ 找尋球場</button>
        <button class="btn btn-green" onclick="scanFacilities()">🌿 掃描設施</button>
        <button class="btn btn-blue" onclick="toggleScorecard()">📋 分數卡</button>
    </div>
    <div class="row">
            <select id="hole-select" onchange="handleHoleSelectChange()">
                <option value="all">-- 顯示全場設施 (Hole All) --</option>
                <script>for(let i=1;i<=18;i++) document.write(`<option value="${i}">第 ${i} 洞 (Hole ${i})</option>`);</script>
            </select>
        </div>

        <div class="display-card" id="dist-card" onclick="toggleMeasureMode()">
            <div><span class="dist-val" id="dist-out">--</span><span style="color:#888; margin-left:5px; font-weight:bold;">YDS</span></div>
            <div style="text-align:right">
                <div style="color:var(--accent); font-weight:bold; font-size: 14px;" id="status-title">測距功能關閉</div>
                <div style="font-size:11px; color:#aaa;" id="info-text">支援深層縮放無視覺斷層</div>
            </div>
        </div>

    <div class="scorecard-panel" id="scorecard-panel" style="display:none;">
        <h3>山溪地高爾夫俱樂部 - 分數卡</h3>
        <div class="scorecard-summary" id="scorecard-summary"></div>
        <div id="scorecard-content"></div>
    </div>
</div>

<script>
    (function(){
        window.addEventListener('error', function(e){
            try{
                const m = document.getElementById('map');
                if (m) m.innerHTML = '<div style="color:#fff; padding:12px; text-align:center;">發生錯誤：' + (e && e.message ? e.message : e) + '<br/>請開啟 Console (F12) 查看詳情。</div>';
            }catch(err){}
            console.error('Global error caught:', e);
        });
        window.addEventListener('unhandledrejection', function(e){
            try{
                const m = document.getElementById('map');
                if (m) m.innerHTML = '<div style="color:#fff; padding:12px; text-align:center;">Promise 錯誤：' + (e && e.reason ? e.reason : e) + '<br/>請開啟 Console (F12) 查看詳情。</div>';
            }catch(err){}
            console.error('Unhandled rejection:', e);
        });
    })();
</script>

<script>
    let map = null;
    try {
        map = new maplibregl.Map({
            container: 'map',
            style: {
            "version": 8,
            "sources": {
                "satellite": {
                    "type": "raster",
                    "tiles": ["https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"],
                    "tileSize": 256,
                    "attribution": "Tiles &copy; Esri",
                    "maxzoom": 18 // 強制快取 18 級圖資，防止放大後出現錯誤
                }
            },
            "layers": [{ 
                "id": "satellite", 
                "type": "raster", 
                "source": "satellite",
                "paint": { "raster-resampling": "linear" } 
            }]
        },
        center: [121.5, 25.03],
        zoom: 10,
        maxZoom: 20, // 允許地圖物件進一步放大
        pitch: 45,
        bearing: 0,
            antialias: true
        });

        map.on('load', () => {
            try { map.resize(); } catch(e){}
            const info = document.getElementById('info-text');
            if (info) info.innerText = '地圖載入完成';
        });

        window.addEventListener('resize', () => { try { if (map) map.resize(); } catch(e){} });
    } catch (e) {
        console.error('Map init error', e);
        const info = document.getElementById('info-text');
        if (info) info.innerText = '地圖初始化失敗：' + (e && e.message ? e.message : e);
        // 顯示使用者可見的錯誤提示
        const m = document.getElementById('map');
        if (m) m.innerHTML = '<div style="color:#fff; padding:20px; text-align:center;">地圖載入失敗，請查看瀏覽器控制台 (Console) 以取得錯誤細節。</div>';
    }

    let allElements = [];
    let measurePoints = [];
    let measureMarkers = [];
    let courseMarkers = [];
    let userMarker = null;
    let isMeasureMode = false;
    let holePositions = {}; // 存儲洞的位置
    let windMarker = null; // 風向標記
    let scorecardVisible = false;
    let positionWatchId = null;

    function locateGPS() {
        const info = document.getElementById('info-text');
        info.innerText = "🛰️ 衛星定位中...";
        let positions = [];
        let attempts = 0;
        const maxAttempts = 5;

        function getPosition() {
            navigator.geolocation.getCurrentPosition(
                (p) => {
                    positions.push({ lng: p.coords.longitude, lat: p.coords.latitude });
                    attempts++;
                    if (attempts < maxAttempts) {
                        setTimeout(getPosition, 1000);
                    } else {
                        const avgLng = positions.reduce((sum, pos) => sum + pos.lng, 0) / positions.length;
                        const avgLat = positions.reduce((sum, pos) => sum + pos.lat, 0) / positions.length;
                        if (userMarker) userMarker.remove();
                        const el = document.createElement('div');
                        el.className = 'user-marker';
                        userMarker = new maplibregl.Marker({ element: el }).setLngLat([avgLng, avgLat]).addTo(map);
                        map.flyTo({ center: [avgLng, avgLat], zoom: 18, pitch: 50, speed: 1.2 });
                        info.innerText = `位置已更新 (平均 ${positions.length} 次讀取)`;
                        startPositionWatch();
                        setTimeout(() => getWeatherAtLocation([avgLng, avgLat]), 1500);
                    }
                },
                (err) => {
                    attempts++;
                    if (attempts < maxAttempts) {
                        setTimeout(getPosition, 1000);
                    } else {
                        info.innerText = `定位失敗 (${err.message})，請檢查權限或在開闊區域重試`;
                    }
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
            );
        }
        getPosition();
    }

    const scorecardData = {
      courseName: "山溪地高爾夫俱樂部",
      englishName: "Suncity Golf & Country Club",
      address: "台灣 306 新竹縣關西鎮玉山里2鄰13號",
      phone: "03-547-6288",
      fax: "03-547-6597",
      totalLengthYards: 6812,
      par: 72,
      front9Totals: { blue: 3388, white: 3209, red: 2886, par: 36 },
      back9Totals: { blue: 3424, white: 3261, red: 2871, par: 36 },
      holes: [
        { number: 1, par: 4, hdcp: 7, distances: { blue: 398, white: 383, red: 351 }, score: null, putts: null },
        { number: 2, par: 4, hdcp: 1, distances: { blue: 462, white: 437, red: 398 }, score: null, putts: null },
        { number: 3, par: 4, hdcp: 3, distances: { blue: 433, white: 410, red: 365 }, score: null, putts: null },
        { number: 4, par: 3, hdcp: 17, distances: { blue: 157, white: 143, red: 131 }, score: null, putts: null },
        { number: 5, par: 4, hdcp: 11, distances: { blue: 299, white: 286, red: 268 }, score: null, putts: null },
        { number: 6, par: 5, hdcp: 9, distances: { blue: 552, white: 529, red: 478 }, score: null, putts: null },
        { number: 7, par: 4, hdcp: 13, distances: { blue: 379, white: 361, red: 313 }, score: null, putts: null },
        { number: 8, par: 3, hdcp: 15, distances: { blue: 162, white: 147, red: 124 }, score: null, putts: null },
        { number: 9, par: 5, hdcp: 5, distances: { blue: 546, white: 513, red: 458 }, score: null, putts: null },
        { number: 10, par: 4, hdcp: 4, distances: { blue: 378, white: 356, red: 306 }, score: null, putts: null },
        { number: 11, par: 4, hdcp: 2, distances: { blue: 412, white: 375, red: 346 }, score: null, putts: null },
        { number: 12, par: 3, hdcp: 18, distances: { blue: 193, white: 183, red: 107 }, score: null, putts: null },
        { number: 13, par: 4, hdcp: 10, distances: { blue: 392, white: 366, red: 316 }, score: null, putts: null },
        { number: 14, par: 3, hdcp: 16, distances: { blue: 173, white: 165, red: 132 }, score: null, putts: null },
        { number: 15, par: 4, hdcp: 12, distances: { blue: 403, white: 388, red: 346 }, score: null, putts: null },
        { number: 16, par: 5, hdcp: 8, distances: { blue: 526, white: 513, red: 486 }, score: null, putts: null },
        { number: 17, par: 4, hdcp: 14, distances: { blue: 372, white: 359, red: 326 }, score: null, putts: null },
        { number: 18, par: 5, hdcp: 6, distances: { blue: 575, white: 556, red: 506 }, score: null, putts: null }
      ]
    };

    function toggleScorecard() {
      scorecardVisible = !scorecardVisible;
      document.getElementById('scorecard-panel').style.display = scorecardVisible ? 'block' : 'none';
      if (scorecardVisible) {
        renderScorecard();
      }
    }

    function handleHoleSelectChange() {
      renderFeatures();
      if (scorecardVisible) renderScorecard();
    }

    function renderScorecard() {
      const summary = document.getElementById('scorecard-summary');
      const content = document.getElementById('scorecard-content');
      const selectedHole = document.getElementById('hole-select').value;
      const totals = calculateScoreTotals();

      summary.innerHTML = `
        <span>球場名稱：${scorecardData.courseName}</span>
        <span>前九：${totals.frontPlayedCount ? totals.frontStrokes : '--'} (${totals.frontPlayedCount} 洞) / ${totals.frontPlayedCount ? totals.frontDiffLabel : '--'}</span>
        <span>後九：${totals.backPlayedCount ? totals.backStrokes : '--'} (${totals.backPlayedCount} 洞) / ${totals.backPlayedCount ? totals.backDiffLabel : '--'}</span>
        <span>總桿數：${totals.playedCount ? totals.totalStrokes : '--'} (${totals.playedCount ? totals.totalDiffLabel : '--'})</span>
        <span>總推桿數：${totals.puttsCount ? totals.totalPutts : '--'}</span>
      `;

      const rows = scorecardData.holes.map(h => {
        const activeClass = selectedHole === String(h.number) ? 'scorecard-row active' : 'scorecard-row';
        const scoreValue = h.score !== null && h.score !== undefined ? h.score : '';
        const puttsValue = h.putts !== null && h.putts !== undefined ? h.putts : '';
                return `
                    <tr class="${activeClass}" onclick="selectHole(${h.number})">
                        <td>${h.number}</td>
                        <td>${h.par}</td>
                        <td>${h.hdcp}</td>
                        <td>${h.distances.blue}</td>
                        <td>${h.distances.white}</td>
                        <td>${h.distances.red}</td>
                        <td>
                            <div style="display:flex; align-items:center; justify-content:center;">
                                <input type="number" min="1" max="15" value="${scoreValue}" onchange="updateHoleValue(${h.number}, 'score', this.value)" style="width:60px; padding:4px; border-radius:6px; border:1px solid rgba(0,0,0,0.2); text-align:center;" />
                                ${getScoreIcon(h)}
                            </div>
                        </td>
                        <td><input type="number" min="0" max="10" value="${puttsValue}" onchange="updateHoleValue(${h.number}, 'putts', this.value)" style="width:60px; padding:4px; border-radius:6px; border:1px solid rgba(0,0,0,0.2); text-align:center;" /></td>
                    </tr>`;
      }).join('');

      content.innerHTML = `
        <table class="scorecard-table">
          <thead>
                        <tr>
                            <th>洞號</th>
                            <th>標準桿</th>
                            <th>桿差</th>
                            <th>藍標</th>
                            <th>白標</th>
                            <th>紅標</th>
                            <th>桿數</th>
                            <th>推桿</th>
                        </tr>
          </thead>
          <tbody>${rows}</tbody>
          <tfoot>
            <tr>
              <td colspan="3">前九</td>
              <td>${scorecardData.front9Totals.blue}</td>
              <td>${scorecardData.front9Totals.white}</td>
              <td>${scorecardData.front9Totals.red}</td>
            </tr>
            <tr>
              <td colspan="3">後九</td>
              <td>${scorecardData.back9Totals.blue}</td>
              <td>${scorecardData.back9Totals.white}</td>
              <td>${scorecardData.back9Totals.red}</td>
            </tr>
          </tfoot>
        </table>
      `;
    }

    function selectHole(number) {
      document.getElementById('hole-select').value = number;
      renderFeatures();
      renderScorecard();
      const info = document.getElementById('info-text');
      info.innerText = `已選擇第 ${number} 洞`;
    }

    function updateHoleValue(number, field, value) {
      const hole = scorecardData.holes.find(h => h.number === number);
      hole[field] = value ? Number(value) : null;
      renderScorecard();
      const info = document.getElementById('info-text');
            const label = field === 'score' ? '桿數' : '推桿';
      info.innerText = `已更新第 ${number} 洞 ${label}：${value || '未輸入'}`;
    }

    function calculateScoreTotals() {
      const frontHoles = scorecardData.holes.slice(0, 9);
      const backHoles = scorecardData.holes.slice(9, 18);
      const frontPlayedHoles = frontHoles.filter(h => h.score !== null && h.score !== undefined && h.score !== '');
      const backPlayedHoles = backHoles.filter(h => h.score !== null && h.score !== undefined && h.score !== '');
      const totalPlayedHoles = scorecardData.holes.filter(h => h.score !== null && h.score !== undefined && h.score !== '');
      const frontStrokes = frontPlayedHoles.reduce((sum, h) => sum + h.score, 0);
      const backStrokes = backPlayedHoles.reduce((sum, h) => sum + h.score, 0);
      const frontPutts = frontHoles.filter(h => h.putts !== null && h.putts !== undefined && h.putts !== '').reduce((sum, h) => sum + h.putts, 0);
      const backPutts = backHoles.filter(h => h.putts !== null && h.putts !== undefined && h.putts !== '').reduce((sum, h) => sum + h.putts, 0);
      const totalStrokes = frontStrokes + backStrokes;
      const totalPutts = frontPutts + backPutts;
      const puttsCount = scorecardData.holes.filter(h => h.putts !== null && h.putts !== undefined && h.putts !== '').length;
      const frontPar = frontPlayedHoles.reduce((sum, h) => sum + h.par, 0);
      const backPar = backPlayedHoles.reduce((sum, h) => sum + h.par, 0);
      const totalPar = totalPlayedHoles.reduce((sum, h) => sum + h.par, 0);
      const frontDiff = frontStrokes - frontPar;
      const backDiff = backStrokes - backPar;
      const totalDiff = totalStrokes - totalPar;
      const formatDiff = diff => diff === 0 ? 'E' : diff > 0 ? `+${diff}` : `${diff}`;
      return {
        totalStrokes,
        totalPutts,
        puttsCount,
        playedCount: totalPlayedHoles.length,
        frontStrokes,
        backStrokes,
        frontPutts,
        backPutts,
        frontPlayedCount: frontPlayedHoles.length,
        backPlayedCount: backPlayedHoles.length,
        frontDiffLabel: frontPlayedHoles.length ? formatDiff(frontDiff) : '--',
        backDiffLabel: backPlayedHoles.length ? formatDiff(backDiff) : '--',
        totalDiffLabel: totalPlayedHoles.length ? formatDiff(totalDiff) : '--'
      };
    }

        function getScoreIcon(h) {
            if (h.score === null || h.score === undefined || h.score === '') return '';
            const diff = h.score - h.par;
            const size = 18;
            const baseStyle = 'vertical-align:middle; margin-left:8px; display:inline-block;';
            if (diff <= -2) {
                return `<span style="${baseStyle}" title="低於標準桿 (Eagle+)">` +
                             `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">` +
                             `<circle cx="12" cy="12" r="9" fill="none" stroke="#0b5" stroke-width="1.6"/>` +
                             `<circle cx="12" cy="12" r="5" fill="none" stroke="#0b5" stroke-width="1.4"/>` +
                             `</svg></span>`;
            }
            if (diff === -1) {
                return `<span style="${baseStyle}" title="低於標準桿 (Birdie)">` +
                             `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">` +
                             `<circle cx="12" cy="12" r="7" fill="none" stroke="#09f" stroke-width="1.8"/>` +
                             `</svg></span>`;
            }
            if (diff === 0) {
                return `<span style="${baseStyle}" title="平標準桿">` +
                             `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">` +
                             `<polygon points="12,5 19,18 5,18" fill="none" stroke="#333" stroke-width="1.6"/>` +
                             `</svg></span>`;
            }
            if (diff === 1) {
                return `<span style="${baseStyle}" title="高於標準桿 (Bogey)">` +
                             `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">` +
                             `<rect x="6" y="6" width="12" height="12" fill="none" stroke="#f55" stroke-width="1.6"/>` +
                             `</svg></span>`;
            }
            if (diff >= 2) {
                return `<span style="${baseStyle}" title="高於標準桿 (+${diff})">` +
                             `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">` +
                             `<rect x="3" y="3" width="18" height="18" fill="none" stroke="#f00" stroke-width="1.4"/>` +
                             `<rect x="8" y="8" width="8" height="8" fill="none" stroke="#f00" stroke-width="1.2"/>` +
                             `</svg></span>`;
            }
            return '';
        }

    let currentView = '3d'; // '3d' or '2d'

    function startPositionWatch() {
        if (positionWatchId) navigator.geolocation.clearWatch(positionWatchId);
        positionWatchId = navigator.geolocation.watchPosition(
            (p) => {
                if (userMarker) {
                    userMarker.setLngLat([p.coords.longitude, p.coords.latitude]);
                }
            },
            (err) => {
                console.log('位置監視錯誤:', err);
            },
            { 
                enableHighAccuracy: true, 
                timeout: 10000, 
                maximumAge: 30000 
            }
        );
    }

    async function getWeatherAtLocation(coord) {
        // coord: [lng, lat]
        const info = document.getElementById('info-text');
        try {
            const lat = coord[1];
            const lon = coord[0];
            if (info) info.innerText = '取得天氣資料...';
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Weather API error');
            const data = await res.json();
            if (data && data.current_weather) {
                const w = data.current_weather;
                const windDir = w.winddirection || 0;
                const windSpeed = w.windspeed || 0;
                const windDirection = (deg => {
                    const dirs = ['N','NE','E','SE','S','SW','W','NW'];
                    return dirs[Math.round(((deg %= 360) < 0 ? deg + 360 : deg) / 45) % 8];
                })(windDir);
                // 呼叫現有的 drawWindDirection
                drawWindDirection({ lng: lon, lat: lat }, windDir, windSpeed, windDirection);
                if (info) info.innerText = `風向 ${windDirection} (${Math.round(windDir)}°)，風速 ${windSpeed} km/h`;
            } else {
                if (info) info.innerText = '無法取得天氣資訊';
            }
        } catch (e) {
            console.error('getWeatherAtLocation error', e);
            if (info) info.innerText = '天氣資訊獲取失敗';
        }
    }

    async function findCourses() {
        const info = document.getElementById('info-text');
        info.innerText = "🔍 搜尋附近球場...";
        courseMarkers.forEach(m => m.remove());
        courseMarkers = [];
        const b = map.getBounds();
        const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
        const query = `[out:json];(nwr["leisure"="golf_course"](${bbox});nwr["golf"="clubhouse"](${bbox}););out center;`;
        try {
            const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await res.json();
            data.elements.forEach(el => {
                const lat = el.lat || (el.center ? el.center.lat : null);
                const lon = el.lon || (el.center ? el.center.lon : null);
                if (lat && lon && el.tags && el.tags.name) {
                    const div = document.createElement('div');
                    div.className = 'map-label';
                    div.innerHTML = `⛳ ${el.tags.name}`;
                    div.onclick = () => { 
                        map.flyTo({ center: [lon, lat], zoom: 18, pitch: 45 }); 
                        setTimeout(scanFacilities, 1000);
                    };
                    const m = new maplibregl.Marker({ element: div }).setLngLat([lon, lat]).addTo(map);
                    courseMarkers.push(m);
                }
            });
            info.innerText = `發現 ${data.elements.length} 個球場`;
        } catch (e) { info.innerText = "連線逾時"; }
    }

    async function scanFacilities() {
        const info = document.getElementById('info-text');
        info.innerText = "🌿 疊加地形數據...";
        const b = map.getBounds();
        const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
        const query = `[out:json];(nwr["golf"](${bbox});nwr["natural"="water"](${bbox}););out geom;`;
        try {
            const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await res.json();
            allElements = data.elements;
            holePositions = {};
            allElements.forEach(el => {
                if (el.tags && el.tags['golf:hole_number']) {
                    const holeNum = el.tags['golf:hole_number'];
                    if (el.geometry && el.geometry.length > 0) {
                        const center = el.geometry[Math.floor(el.geometry.length / 2)];
                        holePositions[holeNum] = [center.lon, center.lat];
                    }
                }
            });
            renderFeatures();
            info.innerText = `設施已同步 (3D) - 發現 ${Object.keys(holePositions).length} 個洞`;
        } catch (e) { info.innerText = "掃描失敗"; }
    }

    function renderFeatures() {
        if (!allElements.length) return;
        const holeNum = document.getElementById('hole-select').value;
        const features = allElements.filter(el => {
            if (holeNum === 'all') return true;
            const ref = el.tags ? (el.tags.ref || el.tags['golf:hole_number']) : null;
            return ref === holeNum;
        }).map(el => {
            let type = el.tags ? (el.tags.golf || el.tags.natural || 'other') : 'other';
            return {
                type: "Feature", properties: { type: type },
                geometry: el.type === 'way' && el.geometry ? { type: "Polygon", coordinates: [el.geometry.map(g => [g.lon, g.lat])] } : null
            };
        }).filter(f => f.geometry);

        if (map.getLayer('golf-layer')) map.removeLayer('golf-layer');
        if (map.getSource('golf-src')) map.removeSource('golf-src');
        map.addSource('golf-src', { type: 'geojson', data: { type: 'FeatureCollection', features: features } });
        map.addLayer({
            id: 'golf-layer', type: 'fill', source: 'golf-src',
            paint: { 
                'fill-color': ['match', ['get', 'type'], 
                    'green', '#00ff00', 'bunker', '#f4ff81', 'fairway', '#76ff03', 'water', '#00b0ff', '#ffffff'],
                'fill-opacity': 0.25 
            }
        });
    }

    function toggleMeasureMode() {
        isMeasureMode = !isMeasureMode;
        const status = document.getElementById('status-title');
        const info = document.getElementById('info-text');
        if (isMeasureMode) {
            if (status) status.innerText = '測距功能開啟';
            if (info) info.innerText = '請於地圖上點選兩個點以測量距離';
            // 清空先前測距標記
            clearMeasure();
        } else {
            if (status) status.innerText = '測距功能關閉';
            if (info) info.innerText = '支援深層縮放無視覺斷層';
            clearMeasure();
        }
    }

    function drawWindDirection(pos, windDir, windSpeed, windDirection) {
        // 移除舊的風向標記
        if (windMarker) windMarker.remove();
        
        // 創建風向箭頭SVG
        const arrowSize = Math.min(50, Math.max(30, windSpeed * 2)); // 根據風速調整箭頭大小
        const svg = `
            <svg width="80" height="80" viewBox="0 0 80 80" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));">
                <!-- 圓形背景 -->
                <circle cx="40" cy="40" r="35" fill="rgba(255, 152, 0, 0.8)" stroke="#fff" stroke-width="2"/>
                
                <!-- 風向箭頭 -->
                <g transform="translate(40, 40) rotate(${windDir})">
                    <!-- 箭頭桿 -->
                    <line x1="0" y1="-25" x2="0" y2="15" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                    <!-- 箭頭頭 -->
                    <polygon points="0,-25 -6,-10 6,-10" fill="#fff"/>
                </g>
                
                <!-- 中心點 -->
                <circle cx="40" cy="40" r="4" fill="#fff"/>
                
                <!-- 風速標籤 -->
                <text x="40" y="65" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">${windSpeed} km/h</text>
            </svg>
        `;
        
        const el = document.createElement('div');
        el.innerHTML = svg;
        el.style.cursor = 'pointer';
        el.title = `風向: ${windDirection}`;
        
        windMarker = new maplibregl.Marker({ element: el }).setLngLat(pos).addTo(map);
    }

    function clearMeasure() {
        // 移除標記與折線、重置測距狀態
        try {
            measureMarkers.forEach(m => { try { m.remove(); } catch(e){} });
            measureMarkers = [];
            measurePoints = [];
            // 移除可能的測距圖層
            if (map && map.getLayer && map.getLayer('measure-line')) {
                try { map.removeLayer('measure-line'); } catch(e){}
            }
            if (map && map.getSource && map.getSource('measure-src')) {
                try { map.removeSource('measure-src'); } catch(e){}
            }
            const out = document.getElementById('dist-out');
            if (out) out.innerText = '--';
            const info = document.getElementById('info-text');
            if (info) info.innerText = '測距已清除';
        } catch(e) { console.error('clearMeasure error', e); }
    }



    function clearAll() {
        // 清除測距
        clearMeasure();
        
        // 清除風向標記
        if (windMarker) {
            windMarker.remove();
            windMarker = null;
        }
        
        const info = document.getElementById('info-text');
        info.innerText = "所有疊加已清除";
    }

    function shareLocation() {
        const info = document.getElementById('info-text');
        if (!userMarker) {
            info.innerText = "請先定位您的位置";
            return;
        }
        const pos = userMarker.getLngLat();
        const url = `https://www.google.com/maps/@${pos.lat},${pos.lng},18z`;
        navigator.clipboard.writeText(url).then(() => {
            info.innerText = "位置連結已複製到剪貼簿";
        }).catch(() => {
            info.innerText = `分享連結: ${url}`;
        });
    }

    map.on('click', (e) => {
        if (!isMeasureMode) return;
        if (measurePoints.length >= 2) clearMeasure();
        const coord = [e.lngLat.lng, e.lngLat.lat];
        measurePoints.push(coord);
        const m = new maplibregl.Marker({ color: measurePoints.length === 1 ? '#00e676' : '#ff1744' }).setLngLat(coord).addTo(map);
        measureMarkers.push(m);
        if (measurePoints.length === 2) {
            const dist = new maplibregl.LngLat(measurePoints[0][0], measurePoints[0][1]).distanceTo(new maplibregl.LngLat(measurePoints[1][0], measurePoints[1][1]));
            document.getElementById('dist-out').innerText = (dist * 1.09361).toFixed(0);
        }
    });
</script>
</body>
