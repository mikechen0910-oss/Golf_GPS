<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf GPS - Pro 3D Satellite</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --primary: #1b5e20; --accent: #ffeb3b; --active: #00e676; --bg-dark: #121212; --user-blue: #2196F3; }
        body { margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; background: var(--bg-dark); overflow: hidden; }
        #map { flex: 1; width: 100%; background: #000; }

        .control-panel { background: white; padding: 12px; border-radius: 20px 20px 0 0; z-index: 900; box-shadow: 0 -5px 20px rgba(0,0,0,0.4); }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        select { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid var(--primary); font-size: 15px; font-weight: bold; background: #fff; outline: none; }
        
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 5px; flex: 1; }
        .btn-blue { background: #0277bd; color: white; }
        .btn-orange { background: #ef6c00; color: white; }
        .btn-green { background: var(--primary); color: white; }
        .btn-red { background: #d32f2f; color: white; }
        .btn-purple { background: #7b1fa2; color: white; }
        
        .display-card { 
            background: #1a1a1a; color: #fff; padding: 12px; border-radius: 10px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 3px solid transparent; border-left: 5px solid var(--accent);
        }
        .display-card.active { border: 3px solid var(--active); background: #002e1a; }
        .dist-val { font-size: 38px; font-weight: 900; color: var(--accent); }

        .map-label { 
            background: rgba(255,255,255,0.9); padding: 5px 10px; border-radius: 15px; 
            border: 2px solid var(--primary); font-weight: bold; font-size: 12px; 
            color: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .user-marker {
            width: 16px; height: 16px; background: var(--user-blue);
            border: 3px solid white; border-radius: 50%; box-shadow: 0 0 12px rgba(0,0,0,0.8);
            position: relative;
        }
        .user-marker::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; background: var(--user-blue); animation: pulse 2s infinite; z-index: -1;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        .scorecard-panel {
            background: rgba(255,255,255,0.97);
            border-radius: 16px;
            padding: 12px;
            margin-top: 10px;
            color: #222;
            border: 1px solid rgba(0,0,0,0.12);
            max-height: 320px;
            overflow: auto;
        }
        .scorecard-panel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: var(--primary);
        }
        .scorecard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .scorecard-table th,
        .scorecard-table td {
            padding: 6px 8px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            text-align: center;
        }
        .scorecard-table th {
            background: rgba(33,150,243,0.1);
            color: #0d47a1;
            font-weight: 700;
        }
        .scorecard-row.active {
            background: rgba(255,235,59,0.3);
        }
        .scorecard-summary {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .scorecard-summary span {
            flex: 1 1 120px;
            background: #f5f5f5;
            border-radius: 8px;
            padding: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .scorecard-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .scorecard-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-save { background: #4caf50; color: white; }
        .btn-finish { background: #2196f3; color: white; }
        .btn-clear { background: #f44336; color: white; }
        .btn-history { background: #7b1fa2; color: white; }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .modal-close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-close:hover {
            color: black;
        }
        .history-item {
            background: #f5f5f5;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .history-item:hover {
            background: #efefef;
        }
        .history-item-title {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .history-item-date {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }
        .history-item-stats {
            display: flex;
            gap: 12px;
            font-size: 13px;
            flex-wrap: wrap;
        }
        .history-item-stat {
            background: white;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .history-detail-modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .history-detail-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="control-panel">
    <div class="row">
        <button class="btn btn-blue" onclick="locateGPS()">📍 我的位置</button>
        <button class="btn btn-orange" onclick="findCourses()">⛳ 找尋球場</button>
        <button class="btn btn-green" onclick="scanFacilities()">🌿 掃描設施</button>
        <button class="btn btn-blue" onclick="toggleScorecard()">📋 分數卡</button>
    </div>
    <div class="row">
        <select id="course-select" onchange="handleCourseChange()">
            <option value="">載入球場資料中...</option>
        </select>
    </div>
    <div class="row" id="routing-row" style="display:none;">
        <select id="routing-select" onchange="handleRoutingChange()"></select>
    </div>
    <div class="row">
        <select id="hole-select" onchange="handleHoleSelectChange()">
            <option value="all">-- 顯示全場設施 (Hole All) --</option>
        </select>
    </div>

    <div class="display-card" id="dist-card" onclick="toggleMeasureMode()">
        <div><span class="dist-val" id="dist-out">--</span><span style="color:#888; margin-left:5px; font-weight:bold;">YDS</span></div>
        <div style="text-align:right">
            <div style="color:var(--accent); font-weight:bold; font-size: 14px;" id="status-title">測距功能關閉</div>
            <div style="font-size:11px; color:#aaa;" id="info-text">支援深層縮放無視覺斷層</div>
        </div>
    </div>

    <div class="scorecard-panel" id="scorecard-panel" style="display:none;">
        <h3 id="coursecard-title">山溪地高爾夫俱樂部 - 分數卡</h3>
        <div class="scorecard-actions">
            <button class="btn-save" onclick="saveScorecardDraft()">💾 暫存</button>
            <button class="btn-finish" onclick="finishScorecard()">✅ 完賽</button>
            <button class="btn-history" onclick="showHistory()">📊 歷史</button>
            <button class="btn-clear" onclick="clearScorecard()">🗑️ 清除</button>
        </div>
        <div class="scorecard-summary" id="scorecard-summary"></div>
        <div id="scorecard-content"></div>
    </div>
</div>

<!-- History Modal -->
<div id="historyModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeHistory()">&times;</span>
        <h2 style="color: var(--primary); margin-top: 0;">📊 歷史紀錄</h2>
        <div id="history-list"></div>
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn btn-red" onclick="clearAllHistory()" style="max-width: 200px;">🗑️ 清除所有歷史</button>
        </div>
    </div>
</div>

<!-- History Detail Modal -->
<div id="historyDetailModal" class="history-detail-modal">
    <div class="history-detail-content">
        <span class="modal-close" onclick="closeHistoryDetail()">&times;</span>
        <h2 id="historyDetailTitle" style="color: var(--primary); margin-top: 0;"></h2>
        <div id="historyDetailBody"></div>
        <div style="text-align: center; margin-top: 20px; display: flex; gap: 10px;">
            <button class="btn btn-green" onclick="exportAsJSON()" style="flex: 1;">📥 匯出 JSON</button>
            <button class="btn btn-red" onclick="deleteHistoryRecord()" style="flex: 1;">🗑️ 刪除此紀錄</button>
        </div>
    </div>
</div>

<script>
    (function(){
        window.addEventListener('error', function(e){
            try{
                const m = document.getElementById('map');
                if (m) m.innerHTML = '<div style="color:#fff; padding:12px; text-align:center;">發生錯誤：' + (e && e.message ? e.message : e) + '<br/>請開啟 Console (F12) 查看詳情。</div>';
            }catch(err){}
            console.error('Global error caught:', e);
        });
        window.addEventListener('unhandledrejection', function(e){
            try{
                const m = document.getElementById('map');
                if (m) m.innerHTML = '<div style="color:#fff; padding:12px; text-align:center;">Promise 錯誤：' + (e && e.reason ? e.reason : e) + '<br/>請開啟 Console (F12) 查看詳情。</div>';
            }catch(err){}
            console.error('Unhandled rejection:', e);
        });
    })();
</script>

<script>
    let map = null;
    try {
        map = new maplibregl.Map({
            container: 'map',
            style: {
            "version": 8,
            "sources": {
                "satellite": {
                    "type": "raster",
                    "tiles": ["https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"],
                    "tileSize": 256,
                    "attribution": "Tiles &copy; Esri",
                    "maxzoom": 18
                }
            },
            "layers": [{ 
                "id": "satellite", 
                "type": "raster", 
                "source": "satellite",
                "paint": { "raster-resampling": "linear" } 
            }]
        },
        center: [121.5, 25.03],
        zoom: 10,
        maxZoom: 20,
        pitch: 45,
        bearing: 0,
            antialias: true
        });

        map.on('load', () => {
            try { map.resize(); } catch(e){}
            const info = document.getElementById('info-text');
            if (info) info.innerText = '地圖載入完成';
        });

        window.addEventListener('resize', () => { try { if (map) map.resize(); } catch(e){} });
    } catch (e) {
        console.error('Map init error', e);
        const info = document.getElementById('info-text');
        if (info) info.innerText = '地圖初始化失敗：' + (e && e.message ? e.message : e);
        const m = document.getElementById('map');
        if (m) m.innerHTML = '<div style="color:#fff; padding:20px; text-align:center;">地圖載入失敗，請查看瀏覽器控制台 (Console) 以取得錯誤細節。</div>';
    }

    let allElements = [];
    let measurePoints = [];
    let measureMarkers = [];
    let courseMarkers = [];
    let userMarker = null;
    let isMeasureMode = false;
    let holePositions = {};
    let windMarker = null;
    let scorecardVisible = false;
    let positionWatchId = null;
    let currentCourse = 'suncity';
    let currentHistoryId = null;

    const STORAGE_KEY_PREFIX = 'golfGpsScorecard_';
    const STORAGE_HISTORY_PREFIX = 'golfGpsHistory_';

    let scorecardDataMap = {};
    let scorecardData = null;
    let currentRoutingId = null;

    function cloneCourseData(course) {
        return JSON.parse(JSON.stringify(course));
    }

    function getCurrentCourseMeta() {
        return scorecardDataMap[currentCourse] || null;
    }

    function getCurrentRoutingMeta() {
        const course = getCurrentCourseMeta();
        if (!course || !Array.isArray(course.routingOptions)) return null;
        return course.routingOptions.find(r => r.id === currentRoutingId) || null;
    }

    function getScorecardStorageKey() {
        return `${STORAGE_KEY_PREFIX}${currentCourse}__${currentRoutingId || 'default'}`;
    }

    function getHistoryStorageKey() {
        return `${STORAGE_HISTORY_PREFIX}${currentCourse}__${currentRoutingId || 'default'}`;
    }

    function buildScorecardData(course, routingId) {
        if (Array.isArray(course.holes)) {
            return cloneCourseData(course);
        }
        const routing = (course.routingOptions || []).find(r => r.id === routingId) || course.routingOptions?.[0];
        if (!routing) throw new Error('找不到球道路線設定');
        const front = course.zones[routing.frontZone];
        const back = course.zones[routing.backZone];
        if (!front || !back) throw new Error('路線區域資料缺失');

        const mapHole = (h, idx, zoneName) => ({
            number: idx + 1,
            par: h.par,
            hdcp: h.hdcp,
            distances: { blue: h.blue, white: h.white, red: h.red },
            score: null,
            putts: null,
            zone: zoneName,
            zoneHole: h.zoneHole
        });
        const frontHoles = front.holes.map((h, i) => mapHole(h, i, front.name));
        const backHoles = back.holes.map((h, i) => mapHole(h, i + 9, back.name));
        const sum = (arr, key) => arr.reduce((s, x) => s + (x[key] || 0), 0);
        const holes = [...frontHoles, ...backHoles];

        return {
            courseName: course.courseName,
            englishName: course.englishName || '',
            address: course.address || '',
            phone: course.phone || '',
            fax: course.fax || '',
            par: sum(holes, 'par'),
            routingId: routing.id,
            routingName: routing.name,
            front9Label: front.name,
            back9Label: back.name,
            front9Totals: { blue: front.total.blue, white: front.total.white, red: front.total.red, par: front.total.par },
            back9Totals: { blue: back.total.blue, white: back.total.white, red: back.total.red, par: back.total.par },
            holes
        };
    }

    function initCourseSelectOptions() {
        const select = document.getElementById('course-select');
        if (!select) return;
        const keys = Object.keys(scorecardDataMap);
        if (!keys.length) {
            select.innerHTML = '<option value="">無球場資料</option>';
            return;
        }
        select.innerHTML = keys.map((key) => `<option value="${key}">${scorecardDataMap[key].courseName}</option>`).join('');
        if (!scorecardDataMap[currentCourse]) currentCourse = keys[0];
        select.value = currentCourse;
    }

    function initRoutingOptions() {
        const row = document.getElementById('routing-row');
        const select = document.getElementById('routing-select');
        const course = getCurrentCourseMeta();
        if (!row || !select || !course) return;
        if (!Array.isArray(course.routingOptions) || course.routingOptions.length === 0) {
            row.style.display = 'none';
            select.innerHTML = '';
            currentRoutingId = null;
            return;
        }
        row.style.display = 'flex';
        select.innerHTML = course.routingOptions.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        currentRoutingId = course.routingOptions.some(r => r.id === currentRoutingId)
            ? currentRoutingId
            : (course.defaultRouting || course.routingOptions[0].id);
        select.value = currentRoutingId;
    }

    async function loadCourseData() {
        const res = await fetch('./courses.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error(`courses.json 載入失敗 (${res.status})`);
        const data = await res.json();
        if (!data || typeof data !== 'object' || !data.courses || typeof data.courses !== 'object') {
            throw new Error('courses.json 格式錯誤');
        }
        scorecardDataMap = data.courses;
        initCourseSelectOptions();
        initRoutingOptions();
        scorecardData = buildScorecardData(scorecardDataMap[currentCourse], currentRoutingId);
        loadScorecardData();
    }

    function initHoleSelectOptions() {
        const select = document.getElementById('hole-select');
        if (!select || select.dataset.initialized === 'true') return;
        const frag = document.createDocumentFragment();
        for (let i = 1; i <= 18; i++) {
            const opt = document.createElement('option');
            opt.value = String(i);
            opt.textContent = `第 ${i} 洞 (Hole ${i})`;
            frag.appendChild(opt);
        }
        select.appendChild(frag);
        select.dataset.initialized = 'true';
    }

    function handleCourseChange() {
        if (!Object.keys(scorecardDataMap).length) return;
        const selected = document.getElementById('course-select').value;
        if (selected !== currentCourse) {
            currentCourse = selected;
            initRoutingOptions();
            scorecardData = buildScorecardData(scorecardDataMap[currentCourse], currentRoutingId);
            loadScorecardData();
            if (scorecardVisible) {
                document.getElementById('coursecard-title').innerText = scorecardData.courseName + (scorecardData.routingName ? ` (${scorecardData.routingName})` : '') + ' - 分數卡';
                renderScorecard();
            }
            const info = document.getElementById('info-text');
            info.innerText = `已切換至 ${scorecardData.courseName}`;
        }
    }

    function handleRoutingChange() {
        const select = document.getElementById('routing-select');
        if (!select) return;
        currentRoutingId = select.value || null;
        const course = getCurrentCourseMeta();
        if (!course) return;
        scorecardData = buildScorecardData(course, currentRoutingId);
        loadScorecardData();
        if (scorecardVisible) renderScorecard();
        const route = getCurrentRoutingMeta();
        setInfo(route ? `已切換路線：${route.name}` : '已切換路線');
    }

    function locateGPS() {
        const info = document.getElementById('info-text');
        info.innerText = "🛰️ 衛星定位中...";
        
        if (!navigator.geolocation) {
            info.innerText = "您的瀏覽器不支援地理定位";
            return;
        }
        
        let positions = [];
        let attempts = 0;
        const maxAttempts = 5;

        function getPosition() {
            navigator.geolocation.getCurrentPosition(
                (p) => {
                    positions.push({ lng: p.coords.longitude, lat: p.coords.latitude });
                    attempts++;
                    if (attempts < maxAttempts) {
                        setTimeout(getPosition, 1000);
                    } else {
                        const avgLng = positions.reduce((sum, pos) => sum + pos.lng, 0) / positions.length;
                        const avgLat = positions.reduce((sum, pos) => sum + pos.lat, 0) / positions.length;
                        if (userMarker) userMarker.remove();
                        const el = document.createElement('div');
                        el.className = 'user-marker';
                        userMarker = new maplibregl.Marker({ element: el }).setLngLat([avgLng, avgLat]).addTo(map);
                        map.flyTo({ center: [avgLng, avgLat], zoom: 18, pitch: 50, speed: 1.2 });
                        info.innerText = `位置已更新 (平均 ${positions.length} 次讀取)`;
                        startPositionWatch();
                        setTimeout(() => getWeatherAtLocation([avgLng, avgLat]), 1500);
                    }
                },
                (err) => {
                    attempts++;
                    let errMsg = '';
                    if (err.code === 1) errMsg = '定位被拒絕，請在設定中允許位置存取';
                    else if (err.code === 2) errMsg = '無法取得位置資訊';
                    else if (err.code === 3) errMsg = '定位逾時，請在開闊區域重試';
                    else errMsg = err.message;
                    
                    if (attempts < maxAttempts) {
                        setTimeout(getPosition, 1500);
                    } else {
                        info.innerText = `定位失敗 (${errMsg})`;
                    }
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }
        getPosition();
    }

    function loadScorecardData() {
        if (!scorecardData || !Array.isArray(scorecardData.holes)) return;
        try {
            const saved = localStorage.getItem(getScorecardStorageKey());
            if (saved) {
                const data = JSON.parse(saved);
                scorecardData.holes.forEach((hole) => {
                    const savedHole = data.holes.find(h => h.number === hole.number);
                    if (savedHole) {
                        hole.score = savedHole.score;
                        hole.putts = savedHole.putts;
                    }
                });
                console.log('分數卡已加載：' + currentCourse);
            }
        } catch (e) {
            console.error('加載分數卡失敗:', e);
        }
    }

    function saveScorecardDraft() {
        try {
            const toSave = JSON.parse(JSON.stringify(scorecardData));
            localStorage.setItem(getScorecardStorageKey(), JSON.stringify(toSave));
            const info = document.getElementById('info-text');
            info.innerText = '💾 分數卡已暫存（未完賽）';
            console.log('分數卡暫存：' + getScorecardStorageKey());
        } catch (e) {
            console.error('暫存分數卡失敗:', e);
            const info = document.getElementById('info-text');
            info.innerText = '❌ 暫存失敗';
        }
    }

    function finishScorecard() {
        const totals = calculateScoreTotals();
        
        // 至少需要完成一個洞
        if (totals.playedCount === 0) {
            alert('請至少輸入一個洞的成績後再完賽');
            return;
        }

        const confirmed = confirm(`確定要完賽嗎？\n總桿數：${totals.totalStrokes}，成績：${totals.totalDiffLabel}`);
        if (!confirmed) return;

        try {
            // 建立歷史記錄
            const now = new Date();
            const timestamp = now.getTime();
            const dateStr = now.toLocaleString('zh-TW');
            
            const historyRecord = {
                id: timestamp,
                course: currentCourse,
                courseName: scorecardData.courseName,
                routingId: currentRoutingId,
                routingName: scorecardData.routingName || null,
                date: dateStr,
                timestamp: timestamp,
                holes: JSON.parse(JSON.stringify(scorecardData.holes)),
                totals: totals
            };

            // 取得現有歷史記錄
            let history = [];
            const historyKey = getHistoryStorageKey();
            const savedHistory = localStorage.getItem(historyKey);
            if (savedHistory) {
                history = JSON.parse(savedHistory);
            }

            // 添加新記錄
            history.push(historyRecord);
            localStorage.setItem(historyKey, JSON.stringify(history));

            // 清除暫存

            // 清空目前分數卡
            scorecardData.holes.forEach(hole => {

            renderScorecard();

    function calculateScoreTotals() {
      const frontHoles = scorecardData.holes.slice(0, 9);
      const backHoles = scorecardData.holes.slice(9, 18);
      const frontPlayedHoles = frontHoles.filter(h => h.score !== null && h.score !== undefined && h.score !== '');
      const backPlayedHoles = backHoles.filter(h => h.score !== null && h.score !== undefined && h.score !== '');
      const totalPlayedHoles = scorecardData.holes.filter(h => h.score !== null && h.score !== undefined && h.score !== '');
      const frontStrokes = frontPlayedHoles.reduce((sum, h) => sum + h.score, 0);
      const backStrokes = backPlayedHoles.reduce((sum, h) => sum + h.score, 0);
      const frontPutts = frontHoles.filter(h => h.putts !== null && h.putts !== undefined && h.putts !== '').reduce((sum, h) => sum + h.putts, 0);
      const backPutts = backHoles.filter(h => h.putts !== null && h.putts !== undefined && h.putts !== '').reduce((sum, h) => sum + h.putts, 0);
      const totalStrokes = frontStrokes + backStrokes;
      const totalPutts = frontPutts + backPutts;
      const puttsCount = scorecardData.holes.filter(h => h.putts !== null && h.putts !== undefined && h.putts !== '').length;
      const frontPar = frontPlayedHoles.reduce((sum, h) => sum + h.par, 0);
      const backPar = backPlayedHoles.reduce((sum, h) => sum + h.par, 0);
      const totalPar = totalPlayedHoles.reduce((sum, h) => sum + h.par, 0);
      const frontDiff = frontStrokes - frontPar;
      const backDiff = backStrokes - backPar;
      const totalDiff = totalStrokes - totalPar;
      const formatDiff = diff => diff === 0 ? 'E' : diff > 0 ? `+${diff}` : `${diff}`;
      return {
        totalStrokes,
        totalPutts,
        puttsCount,
        playedCount: totalPlayedHoles.length,
        frontStrokes,
        backStrokes,
        frontPutts,
        backPutts,
        frontPlayedCount: frontPlayedHoles.length,
        backPlayedCount: backPlayedHoles.length,
        frontDiffLabel: frontPlayedHoles.length ? formatDiff(frontDiff) : '--',
        backDiffLabel: backPlayedHoles.length ? formatDiff(backDiff) : '--',
        totalDiffLabel: totalPlayedHoles.length ? formatDiff(totalDiff) : '--'
      };
    }

    function getScoreIcon(h) {
        if (h.score === null || h.score === undefined || h.score === '') return '';
        const diff = h.score - h.par;
        const size = 18;
        const baseStyle = 'vertical-align:middle; margin-left:8px; display:inline-block;';
        if (diff <= -2) {
            return `<span style="${baseStyle}" title="低於標準桿 (Eagle+)">` +
                         `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">` +
                         `<circle cx="12" cy="12" r="9" fill="none" stroke="#0b5" stroke-width="1.6"/>` +
                         `<circle cx="12" cy="12" r="5" fill="none" stroke="#0b5" stroke-width="1.4"/>` +
                         `</svg></span>`;
        }
        if (diff === -1) {
            return `<span style="${baseStyle}" title="低於標準桿 (Birdie)">` +
                         `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">` +
                         `<circle cx="12" cy="12" r="7" fill="none" stroke="#09f" stroke-width="1.8"/>` +
                         `</svg></span>`;
        }
        if (diff === 0) {
            return `<span style="${baseStyle}" title="平標準桿">` +
                         `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">` +
                         `<polygon points="12,5 19,18 5,18" fill="none" stroke="#333" stroke-width="1.6"/>` +
                         `</svg></span>`;
        }
        if (diff === 1) {
            return `<span style="${baseStyle}" title="高於標準桿 (Bogey)">` +
                         `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">` +
                         `<rect x="6" y="6" width="12" height="12" fill="none" stroke="#f55" stroke-width="1.6"/>` +
                         `</svg></span>`;
        }
        if (diff >= 2) {
            return `<span style="${baseStyle}" title="高於標準桿 (+${diff})">` +
                         `<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">` +
                         `<rect x="3" y="3" width="18" height="18" fill="none" stroke="#f00" stroke-width="1.4"/>` +
                         `<rect x="8" y="8" width="8" height="8" fill="none" stroke="#f00" stroke-width="1.2"/>` +
                         `</svg></span>`;
        }
        return '';
    }

    async function getWeatherAtLocation(coord) {
        const info = document.getElementById('info-text');
        try {
            const lat = coord[1];
            const lon = coord[0];
            if (info) info.innerText = '取得天氣資料...';
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Weather API error');
            const data = await res.json();
            if (data && data.current_weather) {
                const w = data.current_weather;
                const windDir = w.winddirection || 0;
                const windSpeed = w.windspeed || 0;
                const windDirection = (deg => {
                    const dirs = ['N','NE','E','SE','S','SW','W','NW'];
                    return dirs[Math.round(((deg %= 360) < 0 ? deg + 360 : deg) / 45) % 8];
                })(windDir);
                drawWindDirection({ lng: lon, lat: lat }, windDir, windSpeed, windDirection);
                if (info) info.innerText = `風向 ${windDirection} (${Math.round(windDir)}°)，風速 ${windSpeed} km/h`;
            } else {
                if (info) info.innerText = '無法取得天氣資訊';
            }
        } catch (e) {
            console.error('getWeatherAtLocation error', e);
            if (info) info.innerText = '天氣資訊獲取失敗';
        }
    }

    async function findCourses() {
        const info = document.getElementById('info-text');
        info.innerText = "🔍 搜尋附近球場...";
        courseMarkers.forEach(m => m.remove());
        courseMarkers = [];
        const b = map.getBounds();
        const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
        const query = `[out:json];(nwr["leisure"="golf_course"](${bbox});nwr["golf"="clubhouse"](${bbox}););out center;`;
        try {
            const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await res.json();
            data.elements.forEach(el => {
                const lat = el.lat || (el.center ? el.center.lat : null);
                const lon = el.lon || (el.center ? el.center.lon : null);
                if (lat && lon && el.tags && el.tags.name) {
                    const div = document.createElement('div');
                    div.className = 'map-label';
                    div.innerHTML = `⛳ ${el.tags.name}`;
                    div.onclick = () => { 
                        map.flyTo({ center: [lon, lat], zoom: 18, pitch: 45 }); 
                        setTimeout(scanFacilities, 1000);
                    };
                    const m = new maplibregl.Marker({ element: div }).setLngLat([lon, lat]).addTo(map);
                    courseMarkers.push(m);
                }
            });
            info.innerText = `發現 ${data.elements.length} 個球場`;
        } catch (e) { info.innerText = "連線逾時"; }
    }

    async function scanFacilities() {
        const info = document.getElementById('info-text');
        info.innerText = "🌿 疊加地形數據...";
        const b = map.getBounds();
        const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
        const query = `[out:json];(nwr["golf"](${bbox});nwr["natural"="water"](${bbox}););out geom;`;
        try {
            const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await res.json();
            allElements = data.elements;
            holePositions = {};
            allElements.forEach(el => {
                if (el.tags && el.tags['golf:hole_number']) {
                    const holeNum = el.tags['golf:hole_number'];
                    if (el.geometry && el.geometry.length > 0) {
                        const center = el.geometry[Math.floor(el.geometry.length / 2)];
                        holePositions[holeNum] = [center.lon, center.lat];
                    }
                }
            });
            renderFeatures();
            info.innerText = `設施已同步 (3D) - 發現 ${Object.keys(holePositions).length} 個洞`;
        } catch (e) { info.innerText = "掃描失敗"; }
    }

    function renderFeatures() {
        if (!allElements.length) return;
        const holeNum = document.getElementById('hole-select').value;
        const features = allElements.filter(el => {
            if (holeNum === 'all') return true;
            const ref = el.tags ? (el.tags.ref || el.tags['golf:hole_number']) : null;
            return ref === holeNum;
        }).map(el => {
            let type = el.tags ? (el.tags.golf || el.tags.natural || 'other') : 'other';
            return {
                type: "Feature", properties: { type: type },
                geometry: el.type === 'way' && el.geometry ? { type: "Polygon", coordinates: [el.geometry.map(g => [g.lon, g.lat])] } : null
            };
        }).filter(f => f.geometry);

        if (map.getLayer('golf-layer')) map.removeLayer('golf-layer');
        if (map.getSource('golf-src')) map.removeSource('golf-src');
        map.addSource('golf-src', { type: 'geojson', data: { type: 'FeatureCollection', features: features } });
        map.addLayer({
            id: 'golf-layer', type: 'fill', source: 'golf-src',
            paint: { 
                'fill-color': ['match', ['get', 'type'], 
                    'green', '#00ff00', 'bunker', '#f4ff81', 'fairway', '#76ff03', 'water', '#00b0ff', '#ffffff'],
                'fill-opacity': 0.25 
            }
        });
    }

    function toggleMeasureMode() {
        isMeasureMode = !isMeasureMode;
        const status = document.getElementById('status-title');
        const info = document.getElementById('info-text');
        if (isMeasureMode) {
            if (status) status.innerText = '測距功能開啟';
            if (info) info.innerText = '請於地圖上點選兩個點以測量距離';
            clearMeasure();
        } else {
            if (status) status.innerText = '測距功能關閉';
            if (info) info.innerText = '支援深層縮放無視覺斷層';
            clearMeasure();
        }
    }

    function drawWindDirection(pos, windDir, windSpeed, windDirection) {
        if (windMarker) windMarker.remove();
        
        const arrowSize = Math.min(50, Math.max(30, windSpeed * 2));
        const svg = `
            <svg width="80" height="80" viewBox="0 0 80 80" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));">
                <circle cx="40" cy="40" r="35" fill="rgba(255, 152, 0, 0.8)" stroke="#fff" stroke-width="2"/>
                <g transform="translate(40, 40) rotate(${windDir})">
                    <line x1="0" y1="-25" x2="0" y2="15" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                    <polygon points="0,-25 -6,-10 6,-10" fill="#fff"/>
                </g>
                <circle cx="40" cy="40" r="4" fill="#fff"/>
                <text x="40" y="65" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">${windSpeed} km/h</text>
            </svg>
        `;
        
        const el = document.createElement('div');
        el.innerHTML = svg;
        el.style.cursor = 'pointer';
        el.title = `風向: ${windDirection}`;
        
        windMarker = new maplibregl.Marker({ element: el }).setLngLat(pos).addTo(map);
    }

    function clearMeasure() {
        try {
            measureMarkers.forEach(m => { try { m.remove(); } catch(e){} });
            measureMarkers = [];
            measurePoints = [];
            if (map && map.getLayer && map.getLayer('measure-line')) {
                try { map.removeLayer('measure-line'); } catch(e){}
            }
            if (map && map.getSource && map.getSource('measure-src')) {
                try { map.removeSource('measure-src'); } catch(e){}
            }
            const out = document.getElementById('dist-out');
            if (out) out.innerText = '--';
            const info = document.getElementById('info-text');
            if (info) info.innerText = '測距已清除';
        } catch(e) { console.error('clearMeasure error', e); }
    }

    function clearAll() {
        clearMeasure();
        if (windMarker) {
            windMarker.remove();
            windMarker = null;
        }
        const info = document.getElementById('info-text');
        info.innerText = "所有疊加已清除";
    }

    function shareLocation() {
        const info = document.getElementById('info-text');
        if (!userMarker) {
            info.innerText = "請先定位您的位置";
            return;
        }
        const pos = userMarker.getLngLat();
        const url = `https://www.google.com/maps/@${pos.lat},${pos.lng},18z`;
        navigator.clipboard.writeText(url).then(() => {
            info.innerText = "位置連結已複製到剪貼簿";
        }).catch(() => {
            info.innerText = `分享連結: ${url}`;
        });
    }

    if (map) {
        map.on('click', (e) => {
            if (!isMeasureMode) return;
            if (measurePoints.length >= 2) clearMeasure();
            const coord = [e.lngLat.lng, e.lngLat.lat];
            measurePoints.push(coord);
            const m = new maplibregl.Marker({ color: measurePoints.length === 1 ? '#00e676' : '#ff1744' }).setLngLat(coord).addTo(map);
            measureMarkers.push(m);
            if (measurePoints.length === 2) {
                const dist = new maplibregl.LngLat(measurePoints[0][0], measurePoints[0][1]).distanceTo(new maplibregl.LngLat(measurePoints[1][0], measurePoints[1][1]));
                document.getElementById('dist-out').innerText = (dist * 1.09361).toFixed(0);
            }
        });
    }

    // 關閉 modal 的額外處理
    window.addEventListener('click', function(event) {
        const historyModal = document.getElementById('historyModal');
        const detailModal = document.getElementById('historyDetailModal');
        if (event.target == historyModal) {
            historyModal.style.display = 'none';
        }
        if (event.target == detailModal) {
            detailModal.style.display = 'none';
        }
    });

    async function initPage() {
        initHoleSelectOptions();
        try {
            await loadCourseData();
        } catch (e) {
            console.error('球場資料載入失敗:', e);
            setInfo('球場資料載入失敗，請重新整理頁面');
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPage);
    } else {
        initPage();
    }
</script>
</body>
</html>
